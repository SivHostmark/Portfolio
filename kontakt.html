<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt — Siv Høstmark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.gstatic.com/s/jost/v20/92zatBhPNqw73oTd4g.woff2" as="font" type="font/woff2" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .kontakt-section {
      max-width: 760px;
      margin: 0 auto;
      padding: 120px 24px 80px;
    }
    .kontakt-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 56px;
      font-weight: 400;
      margin-bottom: 16px;
      text-align: center;
    }
    .kontakt-intro {
      font-size: 18px;
      line-height: 1.7;
      text-align: center;
      margin-bottom: 56px;
    }
    .kontakt-form {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .kontakt-field-group-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      display: block;
      margin-bottom: 16px;
    }
    .kontakt-name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .kontakt-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      display: block;
      margin-bottom: 8px;
    }
    .kontakt-required {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      opacity: 0.55;
      font-weight: 400;
    }
    .kontakt-input,
    .kontakt-textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d6cfc0;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: #2a2a2a;
      box-sizing: border-box;
    }
    .kontakt-input:focus,
    .kontakt-textarea:focus {
      outline: none;
      border-color: #a89ab8;
      background: rgba(255, 255, 255, 0.85);
    }
    .kontakt-textarea {
      min-height: 180px;
      resize: vertical;
      font-family: 'DM Sans', sans-serif;
    }
    button.btn {
      background: transparent;
      font-family: inherit;
      cursor: pointer;
      align-self: flex-start;
      padding: 14px 44px;
    }
    button.btn:hover {
      background: var(--black);
      color: var(--white);
    }
    .kontakt-alt {
      margin-top: 72px;
      text-align: center;
      font-size: 15px;
      opacity: 0.7;
    }
    .kontakt-alt a {
      margin: 0 8px;
    }
    @media (max-width: 600px) {
      .kontakt-name-row { grid-template-columns: 1fr; }
      .kontakt-heading { font-size: 42px; }
    }
  </style>
</head>
<body class="kontakt-page">

  <!-- HEADER -->
  <header class="dark-nav">
    <div class="logo">
      <a href="siv-portefolio.html" class="logo-mark"><span>S</span></a>
    </div>
    <nav>
      <ul>
        <li><a href="siv-portefolio.html#projects">UX Portefølje</a></li>
        <li><a href="#">Kunst Portefølje</a></li>
        <li class="active"><a href="kontakt.html">Kontakt</a></li>
        <li><a href="about.html">Om meg</a></li>
      </ul>
    </nav>
  </header>

  <!-- KONTAKT -->
  <section class="kontakt-section">
    <h1 class="kontakt-heading">La oss bli kjent!</h1>
    <p class="kontakt-intro">Send gjerne en melding, eller ring meg på <a href="tel:+4791725699" style="color:inherit;text-decoration:underline;">+47 917 25 699</a>.<br>Jeg elsker å bli invitert på kaffe!</p>

    <form class="kontakt-form" action="https://formsubmit.co/siv.hostmark@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="Ny melding fra porteføljen">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="false">
      <div>
        <div class="kontakt-name-row">
          <div>
            <label class="kontakt-label" for="first_name">Fornavn <span class="kontakt-required">(påkrevd)</span></label>
            <input class="kontakt-input" type="text" id="first_name" name="first_name" required>
          </div>
          <div>
            <label class="kontakt-label" for="last_name">Etternavn <span class="kontakt-required">(påkrevd)</span></label>
            <input class="kontakt-input" type="text" id="last_name" name="last_name" required>
          </div>
        </div>
      </div>

      <div>
        <label class="kontakt-label" for="email">E-post <span class="kontakt-required">(påkrevd)</span></label>
        <input class="kontakt-input" type="email" id="email" name="email" required>
      </div>

      <div>
        <label class="kontakt-label" for="message">Melding <span class="kontakt-required">(påkrevd)</span></label>
        <textarea class="kontakt-textarea" id="message" name="message" required></textarea>
      </div>

      <button class="btn" type="submit">Send</button>
    </form>

  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-left">
      <h3><a href="mailto:siv.hostmark@gmail.com">Kontakt meg</a></h3>
      <p><a href="mailto:siv.hostmark@gmail.com">siv.hostmark@gmail.com</a></p>
      <p class="footer-copyright">© 2025 Siv Høstmark</p>
    </div>
    <div class="footer-links">
      <a href="mailto:siv.hostmark@gmail.com" title="Email">
        <svg class="icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      </a>
      <a href="https://no.linkedin.com/in/siv-ragnhild-h%C3%B8stmark-757281130" target="_blank" title="LinkedIn">
        <svg class="icon" viewBox="0 0 24 24"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
      </a>
    </div>
  </footer>

</body>
</html>
