  <script>
    const lightbox = document.getElementById('kunst-lightbox');
    const lightboxImg = lightbox.querySelector('.kunst-lightbox-img');
    const closeBtn = lightbox.querySelector('.kunst-lightbox-close');

    document.querySelectorAll('.kunst-item img').forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightbox.classList.add('visible');
        document.body.style.overflow = 'hidden';
      });
    });

    const closeLightbox = () => {
      lightbox.classList.remove('visible');
      document.body.style.overflow = '';
      lightboxImg.src = '';
    };

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox || e.target === closeBtn) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('visible')) closeLightbox();
    });
  </script>
