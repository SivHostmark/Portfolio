  <script>
    const lightbox = document.getElementById('kunst-lightbox');
    const lightboxImg = lightbox.querySelector('.kunst-lightbox-img');
    const captionTitle = lightbox.querySelector('.caption-title');
    const captionMedium = lightbox.querySelector('.caption-medium');
    const captionSize = lightbox.querySelector('.caption-size');
    const closeBtn = lightbox.querySelector('.kunst-lightbox-close');
    const prevBtn = lightbox.querySelector('.kunst-lightbox-prev');
    const nextBtn = lightbox.querySelector('.kunst-lightbox-next');
    const gridImgs = Array.from(document.querySelectorAll('.kunst-item img'));

    /* Beriker alt-teksten med medium og størrelse fra data-attributtene
       så skjermlesere får full kontekst, mens lightbox-en fortsatt viser
       tittel/medium/størrelse på tre separate linjer i bildeteksten. */
    gridImgs.forEach(img => {
      const title = img.alt;
      img.dataset.title = title;
      const parts = [title, img.dataset.medium, img.dataset.size].filter(Boolean);
      img.alt = parts.join('. ');
    });

    let currentIndex = -1;
    let savedScrollY = 0;   // bevarer scroll-posisjonen mens lightboxen låser siden
    /* Touch-swipe-tilstand for å bla mellom bildene på mobil */
    let touchStartX = 0, touchStartY = 0, swiped = false;
    const SWIPE_MIN = 40; // piksler før et drag regnes som swipe

    /* Slide-animasjon ved bla */
    let isAnimating = false;
    let navToken = 0;       // ugyldiggjør en pågående animasjon når man blar videre
    let recentNav = false;  // sant en liten stund etter siste bla (for å oppdage rask bla)
    let recentTimer = null;
    const SLIDE_DUR = 180;  // ms per fase (ut, så inn)
    const SLIDE_DIST = 36;  // px bildet glir
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const markRecent = () => {
      recentNav = true;
      if (recentTimer) clearTimeout(recentTimer);
      recentTimer = setTimeout(() => { recentNav = false; }, SLIDE_DUR + 80);
    };

    /* Setter bilde og bildetekst direkte. */
    const setImage = (index) => {
      const img = gridImgs[index];
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt;
      captionTitle.textContent = img.dataset.title || img.alt;
      captionMedium.textContent = img.dataset.medium || '';
      captionSize.textContent = img.dataset.size || '';
    };

    /* Bytt bilde uten slide (rask bla, holdt piltast, redusert bevegelse).
       Viser det gjeldende bildet fullt ut med en gang, forhåndslaster/
       dekoder det neste, og bytter src først når det er klart. Da blir
       det aldri et tomt glimt (blink) selv om man blar fort. */
    const snapToImage = (index, token) => {
      lightboxImg.style.transition = 'none';
      lightboxImg.style.transform = 'translateX(0)';
      lightboxImg.style.opacity = '1';
      const pre = new Image();
      pre.src = gridImgs[index].src;
      const apply = () => {
        if (token !== navToken) return; // erstattet av en nyere bla
        setImage(index);
        isAnimating = false;
      };
      if (pre.decode) { pre.decode().then(apply).catch(apply); }
      else { pre.onload = apply; pre.onerror = apply; }
    };

    const showImage = (index) => {
      if (index < 0) index = gridImgs.length - 1;
      if (index >= gridImgs.length) index = 0;
      currentIndex = index;
      setImage(index);
      /* Nullstill inline-stiler fra en evt. tidligere slide, så CSS-ens
         scale-inn på åpning får styre. */
      lightboxImg.style.transition = '';
      lightboxImg.style.transform = '';
      lightboxImg.style.opacity = '';
    };

    /* Myk bla: ton + skyv gjeldende bilde ut, bytt innhold mens det er
       usynlig (etter at neste er ferdig dekodet), ton + skyv det inn fra
       motsatt side. Ved rask bla hoppes det rett til bildet i stedet, så
       man aldri "henger" mens animasjonen spilles av. */
    const navigate = (delta, direction, fast) => {
      let index = currentIndex + delta;
      if (index < 0) index = gridImgs.length - 1;
      if (index >= gridImgs.length) index = 0;
      currentIndex = index; // logisk indeks oppdateres med en gang

      const token = ++navToken; // enhver ny bla ugyldiggjør forrige animasjon
      const instant = fast || reduceMotion || recentNav || isAnimating;
      markRecent();

      if (instant) { snapToImage(index, token); return; }

      isAnimating = true;

      const pre = new Image();
      pre.src = gridImgs[index].src;
      const decoded = pre.decode ? pre.decode().catch(() => {}) : Promise.resolve();

      const exitX = direction === 'next' ? -SLIDE_DIST : SLIDE_DIST;
      const enterX = -exitX;

      lightboxImg.style.transition = 'transform ' + SLIDE_DUR + 'ms ease, opacity ' + SLIDE_DUR + 'ms ease';
      lightboxImg.style.opacity = '0';
      lightboxImg.style.transform = 'translateX(' + exitX + 'px)';

      const fadedOut = new Promise((resolve) => {
        let done = false;
        const finish = () => { if (!done) { done = true; resolve(); } };
        const onEnd = (e) => {
          if (e.propertyName !== 'opacity') return;
          lightboxImg.removeEventListener('transitionend', onEnd);
          finish();
        };
        lightboxImg.addEventListener('transitionend', onEnd);
        setTimeout(finish, SLIDE_DUR + 60); // fallback om transitionend uteblir
      });

      Promise.all([fadedOut, decoded]).then(() => {
        if (token !== navToken) return; // avbrutt av en nyere bla
        setImage(index);
        /* Hopp til inngangssiden uten transition, så animer inn. */
        lightboxImg.style.transition = 'none';
        lightboxImg.style.transform = 'translateX(' + enterX + 'px)';
        void lightboxImg.offsetWidth;
        lightboxImg.style.transition = 'transform ' + SLIDE_DUR + 'ms ease, opacity ' + SLIDE_DUR + 'ms ease';
        lightboxImg.style.opacity = '1';
        lightboxImg.style.transform = 'translateX(0)';
        setTimeout(() => { if (token === navToken) isAnimating = false; }, SLIDE_DUR + 40);
      });
    };

    /* Alle direkte body-barn unntatt selve lightbox-en — settes inert når
       lightbox-en åpnes så fokus holdes inni og resten av siden ikke kan
       tabes til. */
    const pageElements = Array.from(document.body.children).filter(
      el => el !== lightbox
    );

    const openLightbox = (i) => {
      showImage(i);
      lightbox.classList.add('visible');
      lightbox.removeAttribute('aria-hidden');
      /* Lås bakgrunnen så siden ikke kan scrolles mens lightboxen er åpen.
         position: fixed + lagret scroll-posisjon virker også på mobil, der
         overflow: hidden alene ikke alltid stopper touch-scroll. */
      savedScrollY = window.scrollY;
      document.body.style.position = 'fixed';
      document.body.style.top = '-' + savedScrollY + 'px';
      document.body.style.left = '0';
      document.body.style.right = '0';
      document.body.style.overflow = 'hidden';
      pageElements.forEach(el => el.setAttribute('inert', ''));
      /* Fokus til selve lightbox-containeren (tabindex=-1) i stedet for
         X-knappen — så orange focus-outline ikke ligger på X under
         pil-navigasjon. Tab fra container går til Lukk, Forrige, Neste. */
      requestAnimationFrame(() => lightbox.focus({ preventScroll: true }));
    };

    gridImgs.forEach((img, i) => {
      /* Gjør hvert bilde tab-bart og åpne lightbox med Enter / mellomrom */
      img.setAttribute('tabindex', '0');
      img.setAttribute('role', 'button');
      img.setAttribute('aria-label', 'Åpne ' + img.alt);

      img.addEventListener('click', () => openLightbox(i));

      img.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openLightbox(i);
        }
      });
    });

    const closeLightbox = () => {
      lightbox.classList.remove('visible');
      lightbox.setAttribute('aria-hidden', 'true');
      /* Lås opp bakgrunnen og gjenopprett scroll-posisjonen. */
      document.body.style.position = '';
      document.body.style.top = '';
      document.body.style.left = '';
      document.body.style.right = '';
      document.body.style.overflow = '';
      /* Hopp tilbake til lagret posisjon UTEN myk scroll. html har
         scroll-behavior: smooth, så en vanlig scrollTo ville animert
         nedover fra toppen når vi låser opp. Sett 'auto' midlertidig. */
      const prevScrollBehavior = document.documentElement.style.scrollBehavior;
      document.documentElement.style.scrollBehavior = 'auto';
      window.scrollTo(0, savedScrollY);
      document.documentElement.style.scrollBehavior = prevScrollBehavior;
      pageElements.forEach(el => el.removeAttribute('inert'));
      /* Returner fokus til bildet som åpnet lightbox-en, men uten den
         synlige oransje ringen. Ringen kommer tilbake hvis brukeren
         senere Tab-er seg til bildet (klassen fjernes ved blur). */
      if (currentIndex >= 0 && gridImgs[currentIndex]) {
        const target = gridImgs[currentIndex];
        target.classList.add('no-focus-ring');
        target.addEventListener('blur', () => target.classList.remove('no-focus-ring'), { once: true });
        /* preventScroll: ikke hopp/scroll siden til bildet når lightboxen lukkes */
        target.focus({ preventScroll: true });
      }
      setTimeout(() => { lightboxImg.src = ''; }, 300);
    };

    lightbox.addEventListener('click', () => {
      /* Ikke lukk hvis klikket egentlig var slutten på en swipe */
      if (swiped) { swiped = false; return; }
      closeLightbox();
    });

    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      navigate(-1, 'prev');
    });

    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      navigate(1, 'next');
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('visible')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigate(-1, 'prev', e.repeat);
      if (e.key === 'ArrowRight') navigate(1, 'next', e.repeat);
    });

    /* Swipe på touch-skjerm: dra til siden for å bla, samme retning som
       pilene. Vertikale drag ignoreres, og et vanlig trykk er for kort
       til å telle som swipe. */
    lightbox.addEventListener('touchstart', (e) => {
      const t = e.changedTouches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      swiped = false;
    }, { passive: true });

    lightbox.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      if (Math.abs(dx) > SWIPE_MIN && Math.abs(dx) > Math.abs(dy)) {
        swiped = true;
        navigate(dx < 0 ? 1 : -1, dx < 0 ? 'next' : 'prev');
      }
    }, { passive: true });
  </script>
