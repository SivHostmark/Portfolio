  <script>
    const lightbox = document.getElementById('kunst-lightbox');
    const lightboxImg = lightbox.querySelector('.kunst-lightbox-img');
    const captionTitle = lightbox.querySelector('.caption-title');
    const captionMedium = lightbox.querySelector('.caption-medium');
    const captionSize = lightbox.querySelector('.caption-size');
    const closeBtn = lightbox.querySelector('.kunst-lightbox-close');
    const prevBtn = lightbox.querySelector('.kunst-lightbox-prev');
    const nextBtn = lightbox.querySelector('.kunst-lightbox-next');
    const gridImgs = Array.from(document.querySelectorAll('.kunst-item img'));

    let currentIndex = -1;

    const showImage = (index) => {
      if (index < 0) index = gridImgs.length - 1;
      if (index >= gridImgs.length) index = 0;
      currentIndex = index;
      const img = gridImgs[index];
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt;
      captionTitle.textContent = img.alt;
      captionMedium.textContent = img.dataset.medium || '';
      captionSize.textContent = img.dataset.size || '';
    };

    gridImgs.forEach((img, i) => {
      img.addEventListener('click', () => {
        showImage(i);
        lightbox.classList.add('visible');
        document.body.style.overflow = 'hidden';
      });
    });

    const closeLightbox = () => {
      lightbox.classList.remove('visible');
      document.body.style.overflow = '';
      setTimeout(() => { lightboxImg.src = ''; }, 300);
    };

    lightbox.addEventListener('click', () => {
      closeLightbox();
    });

    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      showImage(currentIndex - 1);
    });

    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      showImage(currentIndex + 1);
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('visible')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') showImage(currentIndex - 1);
      if (e.key === 'ArrowRight') showImage(currentIndex + 1);
    });
  </script>
